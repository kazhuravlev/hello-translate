name: Release Extension

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Task
        uses: arduino/setup-task@v2

      - name: Read extension version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Package extension
        run: task package-release RELEASE_VERSION="${{ steps.version.outputs.version }}"

      - name: Write release notes
        run: |
          cat <<'EOF' > dist/release-notes.md
          Hello Translate release ${{ steps.version.outputs.version }}

          Assets:
          - `hello-translate-${{ steps.version.outputs.version }}.zip`: packaged extension bundle

          Note:
          - Chrome users normally load this package by downloading it, extracting it, and using `chrome://extensions` -> `Load unpacked`.
          - Publishing to the Chrome Web Store is a separate step.
          EOF

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Hello Translate ${{ steps.version.outputs.version }}
          body_path: dist/release-notes.md
          files: |
            dist/hello-translate-${{ steps.version.outputs.version }}.zip
          generate_release_notes: true

      - name: Authenticate to Google Cloud
        id: google-auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.CHROME_WEBSTORE_SERVICE_ACCOUNT_JSON }}
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/chromewebstore

      - name: Publish to Chrome Web Store
        env:
          CHROME_PUBLISHER_ID: ${{ secrets.CHROME_PUBLISHER_ID }}
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CHROME_WEBSTORE_TOKEN: ${{ steps.google-auth.outputs.access_token }}
        run: |
          if [ -z "$CHROME_PUBLISHER_ID" ]; then
            echo "CHROME_PUBLISHER_ID secret is not set." >&2
            exit 1
          fi
          if [ -z "$CHROME_EXTENSION_ID" ]; then
            echo "CHROME_EXTENSION_ID secret is not set." >&2
            exit 1
          fi
          task webstore-upload-existing
          task webstore-publish
