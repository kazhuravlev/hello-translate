version: "3"

vars:
  EXT_NAME: hello-translate
  VERSION:
    sh: node -p "require('./manifest.json').version"
  RELEASE_VERSION: '{{default "" .RELEASE_VERSION}}'
  DIST_DIR: dist
  PACKAGE_FILE: "{{.DIST_DIR}}/{{.EXT_NAME}}-{{.VERSION}}.zip"
  PUBLISHER_ID: '{{default "" .CHROME_PUBLISHER_ID}}'
  EXTENSION_ID: '{{default "" .CHROME_EXTENSION_ID}}'
  ACCESS_TOKEN: '{{default "" .CHROME_WEBSTORE_TOKEN}}'

tasks:
  default:
    cmds:
      - task: package

  validate:
    desc: Validate manifest JSON and required packaging files
    cmds:
      - node -e "JSON.parse(require('fs').readFileSync('manifest.json', 'utf8'))"
      - test -f icons/icon-16.png
      - test -f icons/icon-32.png
      - test -f icons/icon-64.png
      - test -f icons/icon-128.png

  clean:
    desc: Remove packaged artifacts
    cmds:
      - rm -rf {{.DIST_DIR}}

  set-version:
    desc: Rewrite manifest.json version for a tagged release
    preconditions:
      - sh: test -n "{{.RELEASE_VERSION}}"
        msg: Set RELEASE_VERSION, for example RELEASE_VERSION=0.3.1.
      - sh: printf "%s" "{{.RELEASE_VERSION}}" | grep -Eq '^[0-9]+(\.[0-9]+){1,3}$'
        msg: RELEASE_VERSION must be a Chrome-compatible dotted numeric version.
    cmds:
      - >
        node -e "const fs=require('fs');
        const path='manifest.json';
        const manifest=JSON.parse(fs.readFileSync(path,'utf8'));
        manifest.version='{{.RELEASE_VERSION}}';
        fs.writeFileSync(path, JSON.stringify(manifest, null, 2) + '\n');"

  package:
    desc: Build a Chrome Web Store upload zip
    deps: [validate]
    cmds:
      - mkdir -p {{.DIST_DIR}}
      - rm -f {{.PACKAGE_FILE}}
      - zip -r {{.PACKAGE_FILE}} manifest.json background.js content.js popup.html popup.css popup.js options.html options.css options.js icons

  package-release:
    desc: Rewrite manifest version from RELEASE_VERSION and build a release zip
    cmds:
      - task: set-version
        vars:
          RELEASE_VERSION: "{{.RELEASE_VERSION}}"
      - task: package

  webstore-upload:
    desc: Upload the current package to the Chrome Web Store draft
    deps: [package]
    preconditions:
      - sh: test -n "{{.PUBLISHER_ID}}"
        msg: Set CHROME_PUBLISHER_ID to your Chrome Web Store publisher id.
      - sh: test -n "{{.EXTENSION_ID}}"
        msg: Set CHROME_EXTENSION_ID to your published extension id.
      - sh: test -n "{{.ACCESS_TOKEN}}"
        msg: Set CHROME_WEBSTORE_TOKEN to an OAuth or service account access token.
    cmds:
      - task: webstore-upload-existing

  webstore-upload-existing:
    desc: Upload an already packaged zip to the Chrome Web Store draft
    preconditions:
      - sh: test -n "{{.PUBLISHER_ID}}"
        msg: Set CHROME_PUBLISHER_ID to your Chrome Web Store publisher id.
      - sh: test -n "{{.EXTENSION_ID}}"
        msg: Set CHROME_EXTENSION_ID to your published extension id.
      - sh: test -n "{{.ACCESS_TOKEN}}"
        msg: Set CHROME_WEBSTORE_TOKEN to an OAuth or service account access token.
      - sh: test -f "{{.PACKAGE_FILE}}"
        msg: Package file {{.PACKAGE_FILE}} does not exist.
    cmds:
      - >
        curl --fail-with-body
        -H "Authorization: Bearer {{.ACCESS_TOKEN}}"
        -H "Content-Type: application/zip"
        -X POST
        --data-binary @{{.PACKAGE_FILE}}
        "https://chromewebstore.googleapis.com/upload/v2/publishers/{{.PUBLISHER_ID}}/items/{{.EXTENSION_ID}}:upload"

  webstore-publish:
    desc: Publish the uploaded draft to the Chrome Web Store
    preconditions:
      - sh: test -n "{{.PUBLISHER_ID}}"
        msg: Set CHROME_PUBLISHER_ID to your Chrome Web Store publisher id.
      - sh: test -n "{{.EXTENSION_ID}}"
        msg: Set CHROME_EXTENSION_ID to your published extension id.
      - sh: test -n "{{.ACCESS_TOKEN}}"
        msg: Set CHROME_WEBSTORE_TOKEN to an OAuth or service account access token.
    cmds:
      - >
        curl --fail-with-body
        -H "Authorization: Bearer {{.ACCESS_TOKEN}}"
        -X POST
        "https://chromewebstore.googleapis.com/v2/publishers/{{.PUBLISHER_ID}}/items/{{.EXTENSION_ID}}:publish"

  webstore-deploy:
    desc: Package, upload, and publish in one step
    cmds:
      - task: webstore-upload
      - task: webstore-publish

  webstore-deploy-release:
    desc: Rewrite manifest version, package once, upload, and publish
    cmds:
      - task: set-version
        vars:
          RELEASE_VERSION: "{{.RELEASE_VERSION}}"
      - task: package
      - task: webstore-upload-existing
      - task: webstore-publish
